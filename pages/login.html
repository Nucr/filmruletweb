<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmRoulette — Giriş</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <div class="login-container">

        <!-- SOL TARAF: Popüler Film Afişi -->
        <div class="login-left" id="loginLeft">
            <div class="poster-overlay">
                <div class="poster-badge">🔥 Bu Ayın En Popüleri</div>
                <h1 id="trendTitle" class="trend-title"></h1>
                <p id="trendOverview" class="trend-overview"></p>
                <div class="trend-meta">
                    <span id="trendRating" class="trend-rating"></span>
                    <span id="trendYear" class="trend-year"></span>
                </div>
            </div>
        </div>

        <!-- SAĞ TARAF: Giriş / Kayıt Formu -->
        <div class="login-right">
            <div class="form-wrapper">
                <div class="brand">
                    <h1>🎬 FilmRoulette</h1>
                    <p class="subtitle">Akşam ne izlesem derdine son!</p>
                </div>

                <!-- Tab Switching -->
                <div class="auth-tabs">
                    <button class="tab-btn active" id="tabLogin" data-tab="login">Giriş Yap</button>
                    <button class="tab-btn" id="tabRegister" data-tab="register">Kayıt Ol</button>
                </div>

                <!-- Giriş Formu -->
                <form id="loginForm" class="auth-form">
                    <div class="input-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="ornek@email.com" required>
                    </div>
                    <div class="input-group">
                        <label for="loginPassword">Şifre</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary">Giriş Yap</button>
                </form>

                <!-- Kayıt Formu -->
                <form id="registerForm" class="auth-form" style="display: none;">
                    <div class="input-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" placeholder="ornek@email.com" required>
                    </div>
                    <div class="input-group">
                        <label for="regPassword">Şifre</label>
                        <input type="password" id="regPassword" placeholder="En az 6 karakter" required minlength="6">
                    </div>
                    <div class="input-group">
                        <label for="regPasswordConfirm">Şifre Tekrar</label>
                        <input type="password" id="regPasswordConfirm" placeholder="Şifreyi tekrar gir" required
                            minlength="6">
                    </div>
                    <button type="submit" class="btn-primary">Kayıt Ol</button>
                </form>

                <!-- Hata / Başarı Mesajı -->
                <p id="authMessage" class="auth-message"></p>

                <!-- Ayırıcı -->
                <div class="divider">
                    <span>veya şununla devam et</span>
                </div>

                <!-- Sosyal Giriş Butonları -->
                <div class="social-buttons">
                    <button class="social-btn google" id="googleBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                        Google
                    </button>

                    <button class="social-btn github" id="githubBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                            <path
                                d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z" />
                        </svg>
                        GitHub
                    </button>
                    <button class="social-btn twitter" id="twitterBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                            <path
                                d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
                        </svg>
                        X (Twitter)
                    </button>
                </div>

                <p class="footer-text">Devam ederek <a href="#">Kullanım Şartları</a>'nı kabul etmiş olursunuz.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import {
            signUp, signIn, onUserChange,
            signInWithGoogle, signInWithGithub, signInWithTwitter
        } from '../js/firebase.js';

        // ─── TMDB'den bu ayın en popüler filmini çek (arka plan için) ───
        const TMDB_API_KEY = '4e3a069664d69bf8ca8a2fbc1ba52568';

        async function loadTrendingMovie() {
            try {
                const res = await fetch(
                    `https://api.themoviedb.org/3/trending/movie/week?api_key=${TMDB_API_KEY}&language=tr-TR`
                );
                const data = await res.json();
                const movie = data.results[0];

                // Arka plan afişi
                const loginLeft = document.getElementById('loginLeft');
                loginLeft.style.backgroundImage = `url(https://image.tmdb.org/t/p/original${movie.backdrop_path || movie.poster_path})`;

                // Film bilgileri
                document.getElementById('trendTitle').textContent = movie.title;
                document.getElementById('trendOverview').textContent =
                    movie.overview.length > 150 ? movie.overview.substring(0, 150) + '...' : movie.overview;
                document.getElementById('trendRating').textContent = `⭐ ${movie.vote_average.toFixed(1)}`;
                document.getElementById('trendYear').textContent = movie.release_date ? movie.release_date.split('-')[0] : '';
            } catch (err) {
                console.error('Trending film yüklenemedi:', err);
            }
        }

        loadTrendingMovie();

        // ─── Tab Değiştirme ───
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const authMessage = document.getElementById('authMessage');

        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            authMessage.textContent = '';
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            registerForm.style.display = 'block';
            loginForm.style.display = 'none';
            authMessage.textContent = '';
        });

        // ─── Mesaj Gösterme ───
        function showMessage(text, isError = true) {
            authMessage.textContent = text;
            authMessage.className = isError ? 'auth-message error' : 'auth-message success';
        }

        // ─── Email Giriş ───
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            try {
                const user = await signIn(email, password);
                if (!user.emailVerified) {
                    showMessage('⚠️ Email adresini doğrulaman gerekiyor. Mailine bak!', true);
                    return;
                }
                showMessage('Giriş başarılı! Yönlendiriliyorsun...', false);
                setTimeout(() => { window.location.href = '../index.html'; }, 1000);
            } catch (err) {
                showMessage(getFirebaseErrorMessage(err.code));
            }
        });

        // ─── Email Kayıt ───
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;

            if (password !== passwordConfirm) {
                showMessage('Şifreler eşleşmiyor!');
                return;
            }

            try {
                await signUp(email, password);
                showMessage('✅ Kayıt başarılı! Doğrulama maili gönderildi. Mailini kontrol et.', false);
                // Kayıt sonrası giriş formuna yönlendir
                setTimeout(() => {
                    tabLogin.click();
                }, 2000);
            } catch (err) {
                showMessage(getFirebaseErrorMessage(err.code));
            }
        });

        // ─── Sosyal Giriş ───
        async function handleSocialLogin(providerFn, providerName) {
            try {
                await providerFn();
                showMessage(`${providerName} ile giriş başarılı! Yönlendiriliyorsun...`, false);
                setTimeout(() => { window.location.href = '../index.html'; }, 1000);
            } catch (err) {
                if (err.code === 'auth/popup-closed-by-user') {
                    showMessage('Giriş penceresi kapatıldı.');
                } else if (err.code === 'auth/account-exists-with-different-credential') {
                    showMessage('Bu email başka bir yöntemle kayıtlı. O yöntemi dene.');
                } else {
                    showMessage(`${providerName} giriş hatası: ${err.message}`);
                }
            }
        }

        document.getElementById('googleBtn').addEventListener('click', () =>
            handleSocialLogin(signInWithGoogle, 'Google'));

        document.getElementById('githubBtn').addEventListener('click', () =>
            handleSocialLogin(signInWithGithub, 'GitHub'));
        document.getElementById('twitterBtn').addEventListener('click', () =>
            handleSocialLogin(signInWithTwitter, 'X (Twitter)'));

        // ─── Kullanıcı zaten giriş yaptıysa ana sayfaya yönlendir ───
        onUserChange((user) => {
            if (user && user.emailVerified) {
                window.location.href = '../index.html';
            }
        });

        // ─── Firebase Hata Mesajları (Türkçe) ───
        function getFirebaseErrorMessage(code) {
            const messages = {
                'auth/email-already-in-use': 'Bu email zaten kullanılıyor.',
                'auth/invalid-email': 'Geçersiz email adresi.',
                'auth/user-not-found': 'Bu emaile ait kullanıcı bulunamadı.',
                'auth/wrong-password': 'Yanlış şifre.',
                'auth/weak-password': 'Şifre en az 6 karakter olmalı.',
                'auth/too-many-requests': 'Çok fazla deneme yaptın. Biraz bekle.',
                'auth/invalid-credential': 'Email veya şifre hatalı.',
                'auth/network-request-failed': 'İnternet bağlantını kontrol et.',
            };
            return messages[code] || `Bir hata oluştu: ${code}`;
        }
    </script>
</body>

</html>
